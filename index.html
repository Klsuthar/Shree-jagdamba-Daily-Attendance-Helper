<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Attendance Helper - Shree Jagdamba Convent School</title>
  
  <!-- PWA Manifest & Theme Color -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2563EB">
  
  <!-- Apple Mobile Web App Settings -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Attendance Helper">
  <link rel="apple-touch-icon" href="icon.svg">

  <!-- Google Fonts: Outfit for premium modern appearance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="phone-wrapper">
    <!-- Sticky Header -->
    <header class="app-header">
      <div class="header-container">
        <div class="logo-area">
          <span class="school-tag">School Portal</span>
          <h1 class="school-name">Shree Jagdamba Convent School</h1>
        </div>
        <div class="date-badge" id="current-date">Wednesday, July 1</div>
      </div>
      
      <!-- Global Controls Row (Good Morning + Numbering) -->
      <div class="card-controls">
        <label class="toggle-label">
          <input type="checkbox" class="toggle-input" id="global-gm">
          Good Morning
        </label>
        <label class="toggle-label">
          <input type="checkbox" class="toggle-input" id="global-num" checked>
          Numbering
        </label>
      </div>

      <!-- Quick Class Navigator Tab Bar -->
      <nav class="quick-nav" id="class-tabs">
        <!-- Generated dynamically to include active states and selection counts -->
      </nav>
    </header>

    <!-- Main Container -->
    <main class="app-container" id="sections-container">
      <div class="loading-state">
        <div class="spinner"></div>
        <p>Loading classes...</p>
      </div>
    </main>

    <!-- Global Floating Action Bar -->
    <div class="floating-actions-bar">
      <button class="btn-clear-all" id="global-btn-clear">Clear All</button>
      <button class="btn-copy-all" id="global-btn-copy">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right:2px"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
        Copy WhatsApp Message
      </button>
    </div>

    <!-- Global Toast Notification -->
    <div class="toast" id="toast">
      <div class="toast-content">
        <span class="toast-icon">📋</span>
        <span class="toast-message" id="toast-msg">Copied to clipboard!</span>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
