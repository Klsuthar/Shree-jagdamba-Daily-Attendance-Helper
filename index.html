<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Attendance Helper - Shree Jagdamba Convent School</title>
  <!-- Google Fonts: Outfit for premium modern appearance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Sticky Header -->
  <header class="app-header">
    <div class="header-container">
      <div class="logo-area">
        <span class="school-tag">School Portal</span>
        <h1 class="school-name">Shree Jagdamba Convent School</h1>
      </div>
      <div class="date-badge" id="current-date">Wednesday, July 1</div>
    </div>
    <!-- Quick Class Navigator (Anchor Tabs) for fast jumping on mobile -->
    <nav class="quick-nav">
      <a href="#nursery-lkg" class="nav-item">Nursery/LKG</a>
      <a href="#ukg-first" class="nav-item">UKG/1st</a>
      <a href="#class-2" class="nav-item">2nd</a>
      <a href="#class-3" class="nav-item">3rd</a>
      <a href="#class-4-5" class="nav-item">4th/5th</a>
    </nav>
  </header>

  <!-- Main Container -->
  <main class="app-container" id="sections-container">
    <div class="loading-state">
      <div class="spinner"></div>
      <p>Loading classes...</p>
    </div>
  </main>

  <!-- Global Toast Notification -->
  <div class="toast" id="toast">
    <div class="toast-content">
      <span class="toast-icon">📋</span>
      <span class="toast-message" id="toast-msg">Copied to clipboard!</span>
    </div>
  </div>

  <!-- Scroll to Top Button -->
  <button class="scroll-to-top" id="scroll-btn" aria-label="Scroll to top">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>
  </button>

  <script src="app.js"></script>
</body>
</html>
