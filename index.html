<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Attendance Helper - Shree Jagdamba Convent School</title>
  <!-- Google Fonts: Outfit for premium modern appearance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="phone-wrapper">
    <!-- Sticky Header -->
    <header class="app-header">
      <div class="header-container">
        <div class="logo-area">
          <span class="school-tag">School Portal</span>
          <h1 class="school-name">Shree Jagdamba Convent School</h1>
        </div>
        <div class="date-badge" id="current-date">Wednesday, July 1</div>
      </div>
      <!-- Quick Class Navigator Tab Bar -->
      <nav class="quick-nav">
        <a href="#nursery-lkg" class="nav-item active" data-class="nursery-lkg">Nursery/LKG</a>
        <a href="#ukg-first" class="nav-item" data-class="ukg-first">UKG/1st</a>
        <a href="#class-2" class="nav-item" data-class="class-2">2nd</a>
        <a href="#class-3" class="nav-item" data-class="class-3">3rd</a>
        <a href="#class-4-5" class="nav-item" data-class="class-4-5">4th/5th</a>
      </nav>
    </header>

    <!-- Main Container -->
    <main class="app-container" id="sections-container">
      <div class="loading-state">
        <div class="spinner"></div>
        <p>Loading classes...</p>
      </div>
    </main>

    <!-- Global Toast Notification -->
    <div class="toast" id="toast">
      <div class="toast-content">
        <span class="toast-icon">📋</span>
        <span class="toast-message" id="toast-msg">Copied to clipboard!</span>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
